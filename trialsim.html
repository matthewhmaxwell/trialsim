<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script>window.PropTypes = window.PropTypes || window.propTypes;</script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3f0; --bg2: #ffffff; --bg3: #eceae6; --bg4: #ddd9d3;
    --text: #1e1e1e; --text2: #5c5650; --text3: #6a645e;
    --accent: #b04e30; --accent2: #943f25; --accent-bg: rgba(176,78,48,0.06);
    --green: #2d7a50; --green-bg: rgba(45,122,80,0.07);
    --orange: #b07d20; --red: #a63d34;
    --clinical: #3e73a8; --digital: #6e5494; --agentic: #2e7370;
    --radius: 6px; --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
    --border: #d4cfca;
  }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; -webkit-font-smoothing: antialiased; }

  /* ── Top Bar ─────────────────────────────────────────── */
  .topbar { display: flex; align-items: center; height: 48px; padding: 0 24px; background: var(--bg2); border-bottom: 1px solid var(--border); gap: 16px; }
  .topbar-brand { display: flex; align-items: center; gap: 8px; }
  .topbar-brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
  /* Beta pill — AIMR purple (#381d92), consistent across every AIMR subdomain tool. Do not re-skin to the app's accent. */
  .topbar-brand .beta-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; background: rgba(56,29,146,0.1); border: 1px solid rgba(56,29,146,0.25); font-size: 9px; font-weight: 600; color: #381d92; letter-spacing: 0.05em; text-transform: uppercase; }
  .topbar-sep { width: 1px; height: 20px; background: var(--bg4); flex-shrink: 0; }
  .topbar-controls { display: flex; align-items: center; gap: 8px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* ── Tab Bar ─────────────────────────────────────────── */
  .tab-bar { display: flex; align-items: stretch; height: 36px; padding: 0 24px; background: var(--bg2); border-bottom: 1px solid var(--border); gap: 0; }
  .tab-btn { padding: 0 16px; font-size: 12px; font-weight: 500; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-btn .tab-sub { font-size: 9px; font-weight: 400; opacity: 0.7; }

  /* ── Shared controls ─────────────────────────────────── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.12s; white-space: nowrap; font-family: inherit; }
  .btn:hover { background: var(--bg3); color: var(--text); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--bg3); }
  select { padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 11px; cursor: pointer; font-family: inherit; }
  .field { display: flex; align-items: center; gap: 5px; }
  .field label { font-size: 11px; color: var(--text3); font-weight: 500; white-space: nowrap; }
  .field input[type="number"] { width: 58px; padding: 4px 6px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 12px; text-align: center; font-family: inherit; }

  /* ── App Layout ──────────────────────────────────────── */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }

  /* ── Pipeline Section (Study View) ──────────────────── */
  .pipeline-section { padding: 28px 32px 20px; }
  .pipeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .pipeline-header h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
  .pipeline-canvas { display: flex; align-items: stretch; gap: 0; overflow-x: auto; padding: 4px 0 12px; }
  .source-stack { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; min-width: 170px; }
  .source-card { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: var(--radius); background: var(--bg2); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-sm); position: relative; }
  .source-card::after { content: 'Edit'; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 8px; color: var(--text3); opacity: 0; transition: opacity 0.15s; font-weight: 500; }
  .source-card:hover::after { opacity: 1; }
  .source-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .source-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(176,78,48,0.12); }
  .source-card.inactive { opacity: 0.3; }
  .source-card .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .source-card .sc-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
  .source-card .sc-vol { font-size: 10px; font-weight: 500; color: var(--text3); }
  .merge-connector { display: flex; align-items: center; justify-content: center; width: 48px; flex-shrink: 0; }
  .merge-connector svg { color: var(--text3); }
  .stage-pipeline { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
  .stage-card { padding: 12px 14px; border-radius: var(--radius-lg); background: var(--bg2); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-sm); min-width: 140px; flex-shrink: 0; }
  .stage-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .stage-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(176,78,48,0.12); }
  .stage-card .sc-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .stage-card .sc-stats { display: flex; gap: 8px; font-size: 10px; color: var(--text3); font-weight: 500; }
  .stage-card .sc-stats2 { display: flex; gap: 8px; font-size: 10px; color: var(--text3); margin-top: 1px; }
  .stage-card .util-bar { height: 3px; border-radius: 2px; background: var(--bg4); margin-top: 8px; overflow: hidden; }
  .stage-card .util-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .terminal-card { background: var(--green-bg); border-color: rgba(45,122,80,0.25); }
  .terminal-card .sc-name { color: var(--green); }
  .stage-arrow { display: flex; align-items: center; justify-content: center; width: 32px; flex-shrink: 0; color: var(--bg4); }
  .stage-arrow svg { width: 24px; height: 14px; }
  .add-stage-pill { display: flex; align-items: center; justify-content: center; padding: 4px 10px; border-radius: 20px; border: 1px dashed var(--border); color: var(--text3); cursor: pointer; font-size: 11px; font-weight: 500; background: transparent; transition: all 0.15s; flex-shrink: 0; margin-left: 4px; font-family: inherit; }
  .add-stage-pill:hover { border-color: var(--text3); color: var(--text2); background: var(--bg3); }
  .source-drawer-toggle { font-size: 11px; font-weight: 500; color: var(--text3); cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: var(--radius); transition: color 0.15s; border: none; background: none; font-family: inherit; }
  .source-drawer-toggle:hover { color: var(--text2); }
  .source-drawer { padding: 0 32px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .source-chip { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); cursor: pointer; font-size: 11px; color: var(--text2); font-weight: 500; transition: all 0.15s; font-family: inherit; }
  .source-chip:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .source-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Config Panel ───────────────────────────────────── */
  .config-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.1); z-index: 19; }
  .config-overlay { position: fixed; top: 0; right: 0; bottom: 0; width: 340px; background: var(--bg2); border-left: 1px solid var(--border); z-index: 20; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; }
  .config-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--bg3); }
  .config-header h3 { font-size: 13px; font-weight: 600; }
  .config-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: var(--radius); }
  .config-close:hover { background: var(--bg3); color: var(--text); }
  .config-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .cfg-group { margin-bottom: 18px; }
  .cfg-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 6px; font-weight: 600; }
  .cfg-group .slider-row { display: flex; align-items: center; gap: 10px; }
  .cfg-group input[type="range"] { flex: 1; accent-color: var(--accent); height: 4px; }
  .cfg-group .val { font-size: 13px; font-weight: 600; min-width: 45px; text-align: right; color: var(--text); }
  .cfg-group input[type="text"] { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 13px; font-family: inherit; }
  .cfg-group input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(176,78,48,0.1); }
  .cfg-group .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .cfg-group .toggle-row input { accent-color: var(--accent); }
  .cfg-delete { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid rgba(166,61,52,0.2); border-radius: var(--radius); background: rgba(166,61,52,0.04); color: var(--red); font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .cfg-delete:hover { background: rgba(166,61,52,0.1); }
  .cfg-hint { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 1.4; }

  /* ── Results Section ─────────────────────────────────── */
  .results-section { padding: 0 32px 32px; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .results-header h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
  .results-status { font-size: 12px; font-weight: 500; }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (min-width: 1200px) { .results-grid { grid-template-columns: 1.2fr 1fr; } }
  .result-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); }
  .result-card h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 12px; font-weight: 600; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-tile { background: var(--bg3); border-radius: var(--radius); padding: 12px; }
  .stat-tile .st-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .stat-tile .st-value { font-size: 20px; font-weight: 700; margin-top: 3px; letter-spacing: -0.5px; }
  .stat-tile .st-sub { font-size: 9px; color: var(--text3); margin-top: 1px; }

  /* Heatmap */
  .heatmap { display: flex; flex-direction: column; gap: 4px; }
  .hm-row { display: flex; align-items: center; gap: 4px; }
  .hm-label { font-size: 10px; color: var(--text2); width: 90px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .hm-cells { display: flex; gap: 2px; flex: 1; }
  .hm-cell { flex: 1; height: 20px; border-radius: 3px; min-width: 3px; }
  .hm-axis { display: flex; gap: 2px; margin-left: 94px; margin-top: 2px; }
  .hm-axis span { flex: 1; font-size: 8px; color: var(--text3); text-align: center; }
  .hm-legend { display: flex; gap: 12px; font-size: 9px; color: var(--text3); margin-bottom: 8px; font-weight: 500; }
  .source-bars { display: flex; flex-direction: column; gap: 5px; margin-top: 16px; }
  .sb-row { display: flex; align-items: center; gap: 8px; }
  .sb-label { font-size: 10px; color: var(--text2); width: 80px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .sb-track { flex: 1; height: 10px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .sb-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .sb-val { font-size: 10px; color: var(--text3); width: 32px; font-weight: 500; }
  .cmp-legend { display: flex; gap: 14px; align-items: center; margin-bottom: 6px; font-size: 10px; color: var(--text3); font-weight: 500; }
  .delta-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .delta-tile { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .delta-tile .dt-arrow { font-size: 14px; }
  .delta-tile .dt-val { font-size: 13px; font-weight: 700; }
  .delta-tile .dt-label { font-size: 9px; color: var(--text3); font-weight: 500; }
  .delta-tile.dt-better { border-color: rgba(45,122,80,0.25); background: var(--green-bg); }
  .delta-tile.dt-better .dt-val { color: var(--green); }
  .delta-tile.dt-worse { border-color: rgba(166,61,52,0.2); background: rgba(166,61,52,0.04); }
  .delta-tile.dt-worse .dt-val { color: var(--red); }
  .delta-tile.dt-neutral .dt-val { color: var(--text3); }
  .cmp-leg { display: flex; align-items: center; gap: 4px; }
  .cmp-line { width: 16px; height: 2px; }
  .cmp-dash { width: 16px; height: 2px; background: repeating-linear-gradient(90deg, var(--text3) 0, var(--text3) 3px, transparent 3px, transparent 6px); }

  /* ── Site View ──────────────────────────────────────── */
  .site-section { padding: 24px 32px 20px; }
  .site-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .site-section-header h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
  .site-controls { display: flex; align-items: center; gap: 8px; }

  .site-table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 20px; max-height: 340px; overflow-y: auto; }
  .site-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .site-table th { position: sticky; top: 0; background: var(--bg3); padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; z-index: 1; }
  .site-table th:hover { color: var(--text2); }
  .site-table th.sorted { color: var(--accent); }
  .site-table td { padding: 6px 10px; border-bottom: 1px solid var(--bg3); }
  .site-table tr:hover td { background: var(--accent-bg); }
  .site-table input[type="text"], .site-table input[type="number"] {
    width: 100%; padding: 3px 6px; border: 1px solid transparent; border-radius: 4px; background: transparent; color: var(--text); font-size: 12px; font-family: inherit;
  }
  .site-table input:focus { border-color: var(--accent); background: var(--bg2); outline: none; }
  .site-table .name-cell { min-width: 150px; }
  .site-table .num-cell { width: 80px; text-align: center; }
  .site-table .num-cell input { text-align: center; }
  .site-table .act-cell { width: 50px; text-align: center; }
  .site-table .del-cell { width: 36px; text-align: center; }
  .site-table .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; }
  .site-table .del-btn:hover { background: rgba(166,61,52,0.1); color: var(--red); }
  .site-table .add-row td { border-bottom: none; }
  .site-table .add-btn { background: none; border: 1px dashed var(--border); color: var(--text3); cursor: pointer; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; font-family: inherit; }
  .site-table .add-btn:hover { background: var(--bg3); color: var(--text2); border-color: var(--text3); }
  .site-table .summary-row td { background: var(--bg3); font-weight: 600; color: var(--text2); border-bottom: none; font-size: 11px; }

  /* Waterfall */
  .wf-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .wf-label { font-size: 10px; color: var(--text2); width: 110px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .wf-track { flex: 1; height: 16px; background: var(--bg4); border-radius: 3px; overflow: hidden; position: relative; }
  .wf-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .wf-val { font-size: 10px; color: var(--text3); width: 28px; font-weight: 500; text-align: right; }

  /* ── Single Site View ────────────────────────────────── */
  .ss-section { padding: 24px 32px 20px; }
  .ss-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .ss-header h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
  .ss-identity { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .ss-identity .cfg-group { margin-bottom: 0; }
  .ss-identity input[type="text"], .ss-identity input[type="number"] { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 12px; font-family: inherit; }

  /* Gantt Chart */
  .gantt-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); margin-bottom: 20px; }
  .gantt-wrap h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 14px; font-weight: 600; }
  .gantt-track { margin-bottom: 14px; }
  .gantt-track-label { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .gantt-track-label .gt-dot { width: 8px; height: 8px; border-radius: 2px; }
  .gantt-row { display: flex; align-items: center; gap: 0; height: 26px; margin-bottom: 3px; position: relative; }
  .gantt-label { font-size: 10px; color: var(--text3); width: 130px; text-align: right; padding-right: 10px; flex-shrink: 0; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gantt-timeline { flex: 1; height: 100%; position: relative; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .gantt-bar { position: absolute; height: 100%; border-radius: 3px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; padding: 0 6px; font-size: 9px; color: #fff; font-weight: 600; overflow: hidden; white-space: nowrap; }
  .gantt-bar:hover { opacity: 0.85; transform: scaleY(1.15); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
  .gantt-fpi { position: absolute; top: -4px; bottom: -4px; width: 2px; background: var(--accent); z-index: 2; }
  .gantt-fpi-label { position: absolute; top: -16px; font-size: 9px; color: var(--accent); font-weight: 600; white-space: nowrap; transform: translateX(-50%); }
  .gantt-axis { display: flex; margin-left: 130px; margin-top: 6px; }
  .gantt-axis span { flex: 1; font-size: 8px; color: var(--text3); text-align: center; }
  .gantt-edit { display: flex; gap: 6px; align-items: center; margin-top: 3px; margin-left: 130px; }
  .gantt-edit label { font-size: 10px; color: var(--text3); font-weight: 500; }
  .gantt-edit input { width: 40px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 3px; font-size: 10px; text-align: center; font-family: inherit; background: var(--bg2); color: var(--text); }

  /* Referral Sources */
  .ref-sources { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .ref-card { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius); background: var(--bg2); border: 1px solid var(--border); box-shadow: var(--shadow-sm); min-width: 140px; }
  .ref-card .rc-name { font-size: 11px; font-weight: 600; color: var(--text); }
  .ref-card .rc-vol { display: flex; align-items: center; gap: 4px; }
  .ref-card .rc-vol input { width: 36px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 3px; font-size: 11px; text-align: center; font-family: inherit; background: var(--bg2); color: var(--text); }
  .ref-card .rc-vol span { font-size: 10px; color: var(--text3); }
  .ref-card .rc-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; margin-left: auto; padding: 2px; }
  .ref-card .rc-del:hover { color: var(--red); }

  /* Capacity */
  .capacity-row { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
  .capacity-row .cap-field { display: flex; align-items: center; gap: 6px; }
  .capacity-row .cap-field label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .capacity-row .cap-field input { width: 50px; padding: 4px 6px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; text-align: center; font-family: inherit; background: var(--bg2); color: var(--text); }

  /* Mini funnel */
  .mini-funnel { display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 4px 0 8px; margin-bottom: 16px; }
  .mf-stage { padding: 8px 10px; border-radius: var(--radius); background: var(--bg2); border: 1px solid var(--border); box-shadow: var(--shadow-sm); min-width: 110px; flex-shrink: 0; cursor: pointer; }
  .mf-stage.selected { border-color: var(--accent); }
  .mf-stage .mf-name { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .mf-stage .mf-meta { font-size: 9px; color: var(--text3); }
  .mf-arrow { display: flex; align-items: center; justify-content: center; width: 24px; flex-shrink: 0; color: var(--bg4); }
  .mf-arrow svg { width: 18px; height: 10px; }
  .mf-terminal { background: var(--green-bg); border-color: rgba(45,122,80,0.25); }
  .mf-terminal .mf-name { color: var(--green); }
  .mf-stage.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(176,78,48,0.12); }
  .ref-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(176,78,48,0.12); }

  /* Detail button in site table */
  .site-table .detail-cell { width: 36px; text-align: center; }
  .site-table .detail-btn { background: none; border: 1px solid var(--border); color: var(--text3); cursor: pointer; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-family: inherit; font-weight: 500; }
  .site-table .detail-btn:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  /* ── Particle Flow Animation ─────────────────────────── */
  .pipeline-canvas { position: relative; }
  .particle-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; overflow: hidden; z-index: 2; }
  @keyframes particleFlow {
    0% { transform: translateX(0); opacity: 0; }
    5% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateX(calc(var(--travel, 600px))); opacity: 0; }
  }
  .particle {
    position: absolute; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); opacity: 0;
    animation: particleFlow var(--dur, 3s) linear infinite;
    animation-delay: var(--delay, 0s);
    box-shadow: 0 0 4px rgba(176,78,48,0.4);
  }
  .particle.fail {
    background: var(--red); box-shadow: 0 0 4px rgba(166,61,52,0.3);
    animation: particleFail var(--dur, 3s) linear infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes particleFail {
    0% { transform: translate(var(--fail-x, 200px), 0); opacity: 0; }
    45% { transform: translate(var(--fail-x, 200px), 0); opacity: 1; }
    100% { transform: translate(var(--fail-x, 200px), 20px); opacity: 0; }
  }

  /* ── Speed Control ──────────────────────────────────── */
  @media print {
    body { overflow: visible !important; height: auto !important; background: #fff !important; }
    .topbar, .tab-bar, .config-overlay, .config-backdrop, .snapshots-overlay, .welcome-banner, .source-drawer, .source-drawer-toggle, .playback-bar, .feedback-widget, header, footer { display: none !important; }
    .app, .main-scroll { height: auto !important; overflow: visible !important; }
    .result-card, .stat-tile { page-break-inside: avoid; box-shadow: none !important; border: 1px solid #ddd !important; }
    .pipeline-section, .results-section { padding: 16px !important; }
  }
  .benchmark-bar { position: relative; height: 6px; background: var(--bg3); border-radius: 3px; margin-top: 4px; }
  .benchmark-range { position: absolute; top: 0; bottom: 0; background: rgba(45,122,80,0.22); border-radius: 3px; }
  .benchmark-mark { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--accent); transform: translateX(-50%); border-radius: 1px; }
  .benchmark-label { font-size: 9px; color: var(--text3); margin-top: 3px; font-weight: 500; }

  .diagnostics-list { display: flex; flex-direction: column; gap: 8px; }
  .diag-item { display: flex; gap: 10px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg2); }
  .diag-item.diag-critical { border-left: 3px solid var(--red); background: rgba(166,61,52,0.04); }
  .diag-item.diag-high { border-left: 3px solid var(--orange); background: rgba(176,125,32,0.04); }
  .diag-item.diag-medium { border-left: 3px solid var(--accent); background: var(--accent-bg); }
  .diag-item.diag-low { border-left: 3px solid var(--text3); }
  .diag-item.diag-good { border-left: 3px solid var(--green); background: var(--green-bg); }
  .diag-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; color: #fff; background: var(--text3); }
  .diag-critical .diag-icon { background: var(--red); }
  .diag-high .diag-icon { background: var(--orange); }
  .diag-medium .diag-icon { background: var(--accent); }
  .diag-good .diag-icon { background: var(--green); }
  .diag-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .diag-text { font-size: 11px; color: var(--text2); line-height: 1.5; }

  .mc-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text2); font-weight: 500; cursor: pointer; user-select: none; }
  .mc-toggle input { accent-color: var(--accent); }
  .mc-summary { display: flex; flex-wrap: wrap; gap: 14px; font-size: 10px; color: var(--text2); padding: 6px 0 8px; border-bottom: 1px solid var(--bg3); margin-bottom: 6px; }
  .mc-summary strong { color: var(--accent); }
  .speed-control, .scrubber-control { display: flex; align-items: center; gap: 6px; }
  .speed-control label, .scrubber-control label { font-size: 10px; color: var(--text3); font-weight: 500; }
  .speed-control input[type="range"] { width: 60px; accent-color: var(--accent); height: 3px; }
  .scrubber-control input[type="range"] { width: 100px; accent-color: var(--accent); height: 3px; }
  .speed-control .speed-val, .scrubber-control .speed-val { font-size: 10px; font-weight: 600; color: var(--accent); min-width: 28px; }

  /* ── Animated Counter ───────────────────────────────── */
  .counter-anim { display: inline-block; transition: transform 0.15s; }

  /* ── Milestone Toast ────────────────────────────────── */
  @keyframes milestoneIn {
    0% { transform: translateX(-50%) scale(0.7) translateY(10px); opacity: 0; }
    50% { transform: translateX(-50%) scale(1.05) translateY(0); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; }
  }
  @keyframes milestoneOut {
    0% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-8px); }
  }
  .milestone-badge {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: #fff; padding: 8px 18px; border-radius: 20px;
    font-size: 12px; font-weight: 600; z-index: 101; box-shadow: var(--shadow-lg);
    animation: milestoneIn 0.4s ease-out forwards;
    letter-spacing: 0.2px;
  }
  .milestone-badge.exit { animation: milestoneOut 0.3s ease-in forwards; }
  .milestone-badge .ms-pct { font-size: 14px; margin-right: 4px; }

  /* ── Playback Progress Bar ──────────────────────────── */
  .playback-bar { height: 3px; background: var(--bg4); margin: 0 32px 0; border-radius: 2px; overflow: hidden; }
  .playback-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.08s linear; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  /* ── Home Page ───────────────────────────────────────── */
  .home { height: 100vh; overflow-y: auto; background: var(--bg); }
  /* ── Mobile Responsive ───────────────────────────────── */
  .mobile-notice { display: none; background: var(--accent-bg); border: 1px solid rgba(176,78,48,0.2); border-radius: var(--radius); padding: 10px 16px; margin: 12px 16px; font-size: 11px; color: var(--text2); text-align: center; line-height: 1.5; }
  .mobile-notice strong { color: var(--accent); }
  .mobile-gate { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; overflow-y: auto; }
  .mobile-gate .mg-logo { height: 48px; margin-bottom: 24px; }
  .mobile-gate h1 { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 10px; letter-spacing: -0.5px; }
  .mobile-gate p { font-size: 14px; color: var(--text2); line-height: 1.55; margin-bottom: 12px; max-width: 420px; }
  .mobile-gate .mg-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; width: 100%; max-width: 300px; }
  .mobile-gate .mg-btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .mobile-gate .mg-btn-ghost { background: transparent; color: var(--text3); border: 1px solid var(--border); padding: 10px 20px; border-radius: var(--radius); font-size: 12px; cursor: pointer; font-family: inherit; }
  .mobile-gate .mg-list { text-align: left; max-width: 360px; margin-top: 12px; font-size: 12px; color: var(--text2); list-style: none; padding-left: 0; }
  .mobile-gate .mg-list li { margin-bottom: 6px; padding-left: 20px; position: relative; line-height: 1.45; }
  .mobile-gate .mg-list li::before { content: '\2713'; position: absolute; left: 0; color: var(--green); font-weight: 700; }
  @media (max-width: 768px) {
    .mobile-notice { display: block; }
    .topbar { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 8px; }
    .topbar-controls { flex-wrap: wrap; }
    .topbar-right { flex-wrap: wrap; }
    .tab-bar { overflow-x: auto; padding: 0 12px; }
    .tab-btn { padding: 0 10px; font-size: 11px; white-space: nowrap; }
    .tab-btn .tab-sub { display: none; }
    .pipeline-section, .site-section, .ss-section, .results-section { padding-left: 16px; padding-right: 16px; }
    .pipeline-canvas { flex-direction: column; align-items: stretch; }
    .source-stack { min-width: auto; margin-right: 0; margin-bottom: 8px; }
    .merge-connector { transform: rotate(90deg); width: auto; height: 32px; }
    .stage-pipeline { flex-wrap: wrap; gap: 4px; }
    .stage-card { min-width: 120px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .delta-row { grid-template-columns: repeat(2, 1fr); }
    .results-grid { grid-template-columns: 1fr; }
    .template-cards { grid-template-columns: repeat(2, 1fr); }
    .home-features { grid-template-columns: 1fr; }
    .home-views { grid-template-columns: 1fr; }
    .home-how { grid-template-columns: repeat(2, 1fr); }
    .home-hero h1 { font-size: 28px; }
    .home-hero .hero-sub { font-size: 14px; }
    .home-stats-bar { flex-wrap: wrap; gap: 20px; padding: 16px 20px; }
    .concept-grid { grid-template-columns: 1fr; }
    .view-cards { grid-template-columns: 1fr; }
    .site-table-wrap { overflow-x: auto; }
    .gantt-wrap { overflow-x: auto; }
    .ss-identity { grid-template-columns: 1fr; }
    .config-overlay { width: 100%; }
  }

  /* home-header replaced by AIMR standard header */
  .home-hero { background: linear-gradient(135deg, #2c2420 0%, #4a3028 40%, #6b4535 100%); color: #fff; padding: 80px 40px 60px; text-align: center; position: relative; overflow: hidden; }
  .home-hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, var(--bg), transparent); }
  .home-hero .hero-badge { display: inline-flex; align-items: center; padding: 4px 14px; border-radius: 20px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); font-size: 11px; font-weight: 500; margin-bottom: 20px; letter-spacing: 0.3px; }
  .home-hero h1 { font-size: 42px; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
  .home-hero .hero-sub { font-size: 16px; opacity: 0.8; max-width: 600px; margin: 0 auto 32px; line-height: 1.6; font-weight: 400; }
  .home-hero .hero-cta { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; transition: background 0.15s; box-shadow: 0 4px 16px rgba(176,78,48,0.3); }
  .home-hero .hero-cta:hover { background: var(--accent2); }
  .home-hero .hero-sec { display: inline-flex; align-items: center; gap: 6px; padding: 12px 24px; border-radius: 8px; background: transparent; color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; border: 1px solid rgba(255,255,255,0.25); cursor: pointer; font-family: inherit; margin-left: 12px; transition: all 0.15s; }
  .home-hero .hero-sec:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .home-stats-bar { display: flex; justify-content: center; gap: 40px; padding: 24px 40px; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .home-stats-bar .hs { text-align: center; }
  .home-stats-bar .hs-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .home-stats-bar .hs-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-top: 2px; }
  .home-section { max-width: 1000px; margin: 0 auto; padding: 48px 40px; }
  .home-section h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.3px; text-align: center; }
  .home-section .hs-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 32px; line-height: 1.6; }
  .home-features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .home-feat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
  .home-feat .hf-icon { font-size: 24px; margin-bottom: 10px; }
  .home-feat h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .home-feat p { font-size: 11px; color: var(--text2); line-height: 1.6; }
  .home-views { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .home-view { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; text-align: center; }
  .home-view .hv-num { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .home-view h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .home-view .hv-when { font-size: 9px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .home-view p { font-size: 11px; color: var(--text2); line-height: 1.6; }
  .home-how { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .home-how-step { text-align: center; padding: 20px 16px; }
  .home-how-step .hhs-num { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); color: var(--text2); font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .home-how-step h4 { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .home-how-step p { font-size: 10px; color: var(--text3); line-height: 1.5; }
  .home-cta-section { text-align: center; padding: 48px 40px; background: var(--bg3); border-top: 1px solid var(--border); }
  .home-cta-section h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .home-cta-section p { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

  /* ── Tutorial Tab ────────────────────────────────────── */
  .tab-btn.tab-tutorial { color: var(--green); }
  .tab-btn.tab-tutorial.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-bar-reopen { margin-left: auto; display: flex; align-items: center; padding-right: 4px; }
  .tab-bar-reopen .reopen-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg2); color: var(--text3); font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; font-family: inherit; transition: all 0.12s; }
  .tab-bar-reopen .reopen-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(176,78,48,0.3); }
  .tutorial-page { padding: 32px; max-width: 900px; margin: 0 auto; }
  .tutorial-page h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; letter-spacing: -0.3px; }
  .tutorial-page .tp-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }
  .tutorial-page h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 32px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .tutorial-page h3 .step-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .tutorial-page p { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
  .tutorial-page .tip { background: var(--accent-bg); border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 var(--radius) var(--radius) 0; font-size: 11px; color: var(--text2); line-height: 1.6; margin: 12px 0; }
  .tutorial-page .tip strong { color: var(--accent); }
  .tutorial-page .concept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }
  .tutorial-page .concept-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .tutorial-page .concept-card h4 { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .tutorial-page .concept-card h4 .cc-icon { font-size: 16px; }
  .tutorial-page .concept-card p { font-size: 11px; margin-bottom: 0; }
  .tutorial-page .view-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
  .tutorial-page .view-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: all 0.15s; }
  .tutorial-page .view-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .tutorial-page .view-card h4 { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }

// ─── useModalFocusTrap: autofocus + cycle Tab within a container ─────
// When `isOpen` is true:
//   1. Remember the element that had focus just before the modal opened.
//   2. Move focus to the first focusable inside the container on next tick.
//   3. Intercept Tab / Shift-Tab so focus wraps inside the container
//      (doesn't leak to the page behind).
// When `isOpen` goes false: restore focus to the prior element.
// Esc is already handled globally in App — this hook only covers focus.
const FOCUSABLE_SELECTOR = [
  'a[href]', 'button:not([disabled])', 'input:not([disabled])',
  'select:not([disabled])', 'textarea:not([disabled])',
  '[tabindex]:not([tabindex="-1"])',
].join(', ');
function useModalFocusTrap(containerRef, isOpen, preferredFocusSelector) {
  const priorFocusRef = useRef(null);
  useEffect(() => {
    if (!isOpen) return;
    priorFocusRef.current = document.activeElement;
    // Focus the "preferred" element if given (e.g. the Name input for a config
    // drawer, or the textarea for the calibrate panel) — otherwise fall back to
    // the first focusable, which is almost always the × Close button.
    const t = setTimeout(() => {
      const root = containerRef.current;
      if (!root) return;
      const preferred = preferredFocusSelector ? root.querySelector(preferredFocusSelector) : null;
      if (preferred && typeof preferred.focus === 'function') {
        preferred.focus();
        if (preferred.select) preferred.select();
        return;
      }
      const items = root.querySelectorAll(FOCUSABLE_SELECTOR);
      const first = items[0];
      if (first && first !== document.activeElement) first.focus();
    }, 0);
    const onKey = (e) => {
      if (e.key !== 'Tab') return;
      const root = containerRef.current;
      if (!root) return;
      const items = Array.from(root.querySelectorAll(FOCUSABLE_SELECTOR))
        .filter(el => !el.hasAttribute('disabled') && el.offsetParent !== null);
      if (!items.length) return;
      const first = items[0], last = items[items.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    };
    document.addEventListener('keydown', onKey, true);
    return () => {
      clearTimeout(t);
      document.removeEventListener('keydown', onKey, true);
      // Restore focus to the element that opened the modal.
      const prior = priorFocusRef.current;
      if (prior && typeof prior.focus === 'function' && document.body.contains(prior)) prior.focus();
    };
  }, [isOpen, containerRef]);
}

// ─── Animated Counter Component ──────────────────────────────────────
function AnimCounter({ value, prefix = '', suffix = '', duration = 600 }) {
  const [display, setDisplay] = useState(value);
  const prevRef = useRef(null);
  const animRef2 = useRef(null);
  useEffect(() => {
    const to = typeof value === 'number' ? value : parseFloat(value) || 0;
    if (prevRef.current === null) { prevRef.current = to; setDisplay(value); return; } // skip animation on first render
    const from = prevRef.current;
    if (from === to) { setDisplay(value); return; }
    const start = performance.now();
    const step = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
      const current = from + (to - from) * eased;
      setDisplay(typeof value === 'number' ? Math.round(current) : current.toFixed(1));
      if (t < 1) animRef2.current = requestAnimationFrame(step);
    };
    animRef2.current = requestAnimationFrame(step);
    prevRef.current = to;
    return () => { if (animRef2.current) cancelAnimationFrame(animRef2.current); };
  }, [value, duration]);
  return <span className="counter-anim">{prefix}{typeof display === 'number' ? display.toLocaleString() : display}{suffix}</span>;
}

// ─── Particle Flow Component ─────────────────────────────────────────
function ParticleFlow({ isPlaying, stageCount, sourceCount }) {
  if (!isPlaying) return null;
  const particles = [];
  const totalStages = stageCount + 1; // +1 for merge zone
  const travelPx = totalStages * 172; // approx px per stage+arrow
  for (let i = 0; i < Math.min(sourceCount * 3, 18); i++) {
    const yBase = 10 + (i % sourceCount) * 36;
    const delay = (Math.random() * 2.5).toFixed(2);
    const dur = (2.5 + Math.random() * 1.5).toFixed(2);
    const yJitter = Math.round(Math.random() * 8 - 4);
    particles.push(
      <div key={`p${i}`} className="particle" style={{
        left: 170, top: yBase + yJitter,
        '--travel': `${travelPx}px`, '--delay': `${delay}s`, '--dur': `${dur}s`,
      }} />
    );
  }
  // A few fail particles that drop out mid-pipeline
  for (let i = 0; i < Math.min(stageCount, 4); i++) {
    const failX = 220 + i * 172;
    particles.push(
      <div key={`f${i}`} className="particle fail" style={{
        left: 0, top: 50 + Math.random() * 20,
        '--fail-x': `${failX}px`, '--delay': `${(1 + Math.random() * 2).toFixed(2)}s`, '--dur': '3s',
      }} />
    );
  }
  return <div className="particle-layer">{particles}</div>;
}

// ─── Gantt Chart Component ───────────────────────────────────────────
function GanttChart({ startup, onChange, fpi }) {
  const maxWeek = Math.max(fpi + 2, 16);
  const [editing, setEditing] = useState(null); // { track, idx }
  const prevStartupRef = useRef(startup);
  useEffect(() => { if (startup !== prevStartupRef.current) { setEditing(null); prevStartupRef.current = startup; } }, [startup]);

  const updateMilestone = (track, idx, field, val) => {
    const newStartup = { ...startup };
    const updated = startup[track].map((m, i) => i === idx ? { ...m, [field]: Math.max(1, +val || 1) } : { ...m });
    // Auto-cascade: each milestone starts after the previous one ends
    for (let i = 1; i < updated.length; i++) {
      const prevEnd = updated[i - 1].startWeek + updated[i - 1].durationWeeks;
      if (updated[i].startWeek < prevEnd) updated[i].startWeek = prevEnd;
    }
    newStartup[track] = updated;
    onChange(newStartup);
  };

  return (
    <div className="gantt-wrap">
      <h4>Startup Timeline <span style={{ float: 'right', fontSize: 9, fontWeight: 500, color: 'var(--accent)' }}>FPI: Week {fpi}</span></h4>
      <div style={{ fontSize: 9, color: 'var(--text3)', marginBottom: 10, marginTop: -8 }}>Click any bar to edit its start week and duration</div>
      {Object.entries(startup).map(([track, milestones]) => (
        <div key={track} className="gantt-track">
          <div className="gantt-track-label"><div className="gt-dot" style={{ background: TRACK_COLORS[track] }} />{TRACK_LABELS[track]}</div>
          {milestones.map((m, idx) => {
            const left = ((m.startWeek - 1) / maxWeek) * 100;
            const width = (m.durationWeeks / maxWeek) * 100;
            return (
              <div key={m.id}>
                <div className="gantt-row">
                  <div className="gantt-label">{m.name}</div>
                  <div className="gantt-timeline">
                    <div className="gantt-bar" style={{ left: `${left}%`, width: `${width}%`, background: TRACK_COLORS[track] }}
                      onClick={() => setEditing(editing?.track === track && editing?.idx === idx ? null : { track, idx })}>
                      {m.durationWeeks}w
                    </div>
                    {/* FPI line */}
                    <div className="gantt-fpi" style={{ left: `${((fpi - 1) / maxWeek) * 100}%` }} />
                  </div>
                </div>
                {editing?.track === track && editing?.idx === idx && (
                  <div className="gantt-edit">
                    <label>Start wk</label>
                    <input type="number" value={m.startWeek} onChange={e => updateMilestone(track, idx, 'startWeek', e.target.value)} />
                    <label>Duration</label>
                    <input type="number" value={m.durationWeeks} onChange={e => updateMilestone(track, idx, 'durationWeeks', e.target.value)} />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
      <div className="gantt-axis" style={{ position: 'relative' }}>
        {Array.from({ length: Math.min(maxWeek, 16) }, (_, i) => <span key={i}>W{i + 1}</span>)}
        <div className="gantt-fpi" style={{ left: `${((fpi - 1) / maxWeek) * 100}%`, top: -6, bottom: -2 }}>
          <div className="gantt-fpi-label">FPI</div>
        </div>
      </div>
    </div>
  );
}

          <div className="cfg-group"><label>Category</label><select style={{ width: '100%', padding: '7px 10px', border: '1px solid var(--border)', borderRadius: 'var(--radius)', background: 'var(--bg2)', color: 'var(--text)', fontSize: 13, fontFamily: 'inherit' }} value={node.category || 'clinical'} onChange={e => onChange({ category: e.target.value })}><option value="clinical">Clinical</option><option value="digital">Digital</option><option value="agentic">Agentic / AI</option></select></div>

            <div style={{ padding: '8px 10px', background: 'rgba(176,125,32,0.08)', border: '1px solid rgba(176,125,32,0.3)', borderRadius: 'var(--radius)', fontSize: 10, color: 'var(--text2)', lineHeight: 1.45, marginBottom: 12 }}>
              {'\u26A0'} <strong>Scenario assumption, not a benchmark.</strong> Agentic channels are 2025 projections. Calibrate against your own pilots before planning.
            </div>
          )}
          <div className="cfg-group"><label>Volume (patients/week) <Cited id={`source.vol.${node.category || 'clinical'}`} /></label><div className="slider-row"><input type="range" min="0" max="100" value={node.volume} onChange={e => onChange({ volume: +e.target.value })} /><span className="val">{node.volume}</span></div></div>
          <div className="cfg-group"><label>Ramp-up (weeks) <Cited id="site.ramp" /></label><div className="slider-row"><input type="range" min="1" max="12" value={node.rampUpWeeks} onChange={e => onChange({ rampUpWeeks: +e.target.value })} /><span className="val">{node.rampUpWeeks}</span></div></div>
          <div className="cfg-group"><label>Cost per patient ($)</label><div className="slider-row"><input type="range" min="0" max="2000" step="10" value={node.costPerPatient} onChange={e => onChange({ costPerPatient: +e.target.value })} /><span className="val">${node.costPerPatient}</span></div></div>
          <div className="cfg-group"><label className="toggle-row"><input type="checkbox" checked={node.active !== false} onChange={e => onChange({ active: e.target.checked })} /> Active</label></div>
        </>}
        {!isSource && !isTerminal && <>
          <div className="cfg-group">
            <label title="Percentage of patients who pass this stage and advance to the next">Conversion Rate (%) <Cited id="funnel.conversion" /></label>
            <div className="slider-row"><input type="range" min="0" max="100" value={node.conversionRate} onChange={e => onChange({ conversionRate: +e.target.value })} /><span className="val">{node.conversionRate}%</span></div>
            <div className="benchmark-bar" title="Industry typical range: 40-80%"><div className="benchmark-range" style={{ left: '40%', width: '40%' }} /><div className="benchmark-mark" style={{ left: `${node.conversionRate}%` }} /></div>
            <div className="benchmark-label">Industry typical: 40-80% {node.conversionRate < 35 && <span style={{ color: 'var(--red)' }}>\u2022 Below typical</span>}{node.conversionRate > 85 && <span style={{ color: 'var(--orange)' }}>\u2022 Above typical</span>}</div>
          </div>
          <div className="cfg-group"><label title="Maximum patients this stage can process per week (capacity constraint)">Throughput (patients/week)</label><div className="slider-row"><input type="range" min="1" max="500" value={node.throughputPerWeek} onChange={e => onChange({ throughputPerWeek: +e.target.value })} /><span className="val">{node.throughputPerWeek}</span></div></div>
          <div className="cfg-group"><label>Avg Duration (days)</label><div className="slider-row"><input type="range" min="1" max="60" value={node.avgDurationDays} onChange={e => onChange({ avgDurationDays: +e.target.value })} /><span className="val">{node.avgDurationDays}d</span></div></div>
          <div className="cfg-group">
            <label title="Percentage of patients who leave mid-stage (different from failing to convert)">Dropout Rate (%)</label>
            <div className="slider-row"><input type="range" min="0" max="30" value={node.dropoutRate} onChange={e => onChange({ dropoutRate: +e.target.value })} /><span className="val">{node.dropoutRate}%</span></div>
            <div className="benchmark-bar" title="Industry typical range: 1-10%"><div className="benchmark-range" style={{ left: `${(1/30)*100}%`, width: `${(9/30)*100}%` }} /><div className="benchmark-mark" style={{ left: `${(node.dropoutRate/30)*100}%` }} /></div>
            <div className="benchmark-label">Industry typical: 1-10% {node.dropoutRate > 15 && <span style={{ color: 'var(--red)' }}>\u2022 High dropout</span>}</div>
          </div>
        </>}
        {isTerminal && <div className="cfg-hint">This is the enrollment endpoint. Patients reaching this node count as enrolled.</div>}
        {!isTerminal && <button className="cfg-delete" onClick={onDelete}>Remove {isSource ? 'Source' : 'Stage'}</button>}
      </div>
    </div>
  );
}

function SiteTable({ sites, onChange, onAdd, onDelete, onDrillIn }) {
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState(1);

  const handleSort = (key) => {
    if (sortKey === key) setSortDir(d => -d);
    else { setSortKey(key); setSortDir(1); }
  };

  const sorted = useMemo(() => {
    if (!sortKey) return sites;
    return [...sites].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
      return ((av || 0) - (bv || 0)) * sortDir;
    });
  }, [sites, sortKey, sortDir]);

  const updateSite = (id, field, val) => {
    onChange(sites.map(s => s.id === id ? { ...s, [field]: val } : s));
  };

  const cols = [
    { key: 'name', label: 'Site Name', cls: 'name-cell' },
    { key: 'enrollmentRate', label: 'Rate/wk', cls: 'num-cell', cite: 'source.vol.clinical' },
    { key: 'activationWeek', label: 'Activ. Wk', cls: 'num-cell', cite: 'site.ramp' },
    { key: 'screenFailRate', label: 'Screen Fail %', cls: 'num-cell', cite: 'funnel.screenfail' },
    { key: 'dropoutRate', label: 'Dropout %', cls: 'num-cell' },
    { key: 'costPerPatient', label: 'Cost/Pt', cls: 'num-cell' },
    { key: 'cap', label: 'Cap', cls: 'num-cell' },
  ];

  const totals = {
    enrollmentRate: sites.filter(s => s.active).reduce((a, s) => a + s.enrollmentRate, 0).toFixed(1),
    screenFailRate: sites.length > 0 ? Math.round(sites.reduce((a, s) => a + s.screenFailRate, 0) / sites.length) : 0,
    dropoutRate: sites.length > 0 ? Math.round(sites.reduce((a, s) => a + s.dropoutRate, 0) / sites.length) : 0,
  };

  return (
    <div className="site-table-wrap">
      <table className="site-table">
        <thead>
          <tr>
            {cols.map(c => (
              <th key={c.key} className={`${c.cls} ${sortKey === c.key ? 'sorted' : ''}`} onClick={() => handleSort(c.key)}>
                {c.label} {c.cite && <Cited id={c.cite} compact />} {sortKey === c.key ? (sortDir > 0 ? '\u2191' : '\u2193') : ''}
              </th>
            ))}
            <th className="act-cell">On</th>
            <th className="detail-cell"></th>
            <th className="del-cell"></th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(s => (
            <tr key={s.id} style={{ opacity: s.active ? 1 : 0.4 }}>
              <td className="name-cell" style={{ position: 'relative' }}>
                {s.calibrated && (
                  <span
                    aria-label={`Calibrated from actuals: observed ${s.calibrated.observedRate}/wk, rescaled ${s.calibrated.mult}× vs baseline`}
                    title={`Calibrated: observed ${s.calibrated.observedRate}/wk (${s.calibrated.mult}× baseline)`}
                    style={{
                      position: 'absolute', left: 2, top: '50%', transform: 'translateY(-50%)',
                      display: 'inline-flex', alignItems: 'center', gap: 3,
                      fontSize: 9, fontWeight: 700, color: 'var(--green)',
                      background: 'rgba(45,122,80,0.1)', border: '1px solid rgba(45,122,80,0.35)',
                      borderRadius: 3, padding: '1px 4px', lineHeight: 1, whiteSpace: 'nowrap',
                      fontFamily: 'Menlo, monospace',
                    }}
                  >
                    <span aria-hidden="true">{'\u2713'}</span>cal
                  </span>
                )}
                <input
                  type="text" value={s.name}
                  onChange={e => updateSite(s.id, 'name', e.target.value)}
                  style={{ paddingLeft: s.calibrated ? 42 : undefined, fontWeight: s.calibrated ? 600 : undefined }}
                />
              </td>
              <td className="num-cell"><input type="number" step="0.1" min="0" value={s.enrollmentRate} onChange={e => updateSite(s.id, 'enrollmentRate', +e.target.value || 0)} /></td>
              <td className="num-cell"><input type="number" min="1" value={s.activationWeek} onChange={e => updateSite(s.id, 'activationWeek', Math.max(1, +e.target.value || 1))} /></td>
              <td className="num-cell"><input type="number" min="0" max="100" value={s.screenFailRate} onChange={e => updateSite(s.id, 'screenFailRate', Math.min(100, Math.max(0, +e.target.value || 0)))} /></td>
              <td className="num-cell"><input type="number" min="0" max="100" value={s.dropoutRate} onChange={e => updateSite(s.id, 'dropoutRate', Math.min(100, Math.max(0, +e.target.value || 0)))} /></td>
              <td className="num-cell"><input type="number" min="0" step="100" value={s.costPerPatient || ''} placeholder="$" onChange={e => updateSite(s.id, 'costPerPatient', +e.target.value || 0)} /></td>
              <td className="num-cell"><input type="number" min="0" value={s.cap || ''} placeholder={'\u221e'} onChange={e => updateSite(s.id, 'cap', e.target.value ? +e.target.value : null)} /></td>
              <td className="act-cell"><input type="checkbox" checked={s.active} onChange={e => updateSite(s.id, 'active', e.target.checked)} style={{ accentColor: 'var(--accent)' }} /></td>
              <td className="detail-cell">{onDrillIn && <button className="detail-btn" onClick={() => onDrillIn(s.id)} aria-label={`Drill into ${s.name}`} title={`Open ${s.name} in Single Site View`}>{'\u2192'}</button>}</td>
              <td className="del-cell"><button className="del-btn" onClick={() => onDelete(s.id)} aria-label={`Remove ${s.name}`} title={`Remove ${s.name}`}>&times;</button></td>
            </tr>
          ))}
          <tr className="add-row"><td colSpan="10"><button className="add-btn" onClick={onAdd}>+ Add Site</button></td></tr>
          <tr className="summary-row">
            <td>{sites.length} sites</td>
            <td className="num-cell">{totals.enrollmentRate}/wk</td>
            <td className="num-cell"></td>
            <td className="num-cell">{totals.screenFailRate}% avg</td>
            <td className="num-cell">{totals.dropoutRate}% avg</td>
            <td className="num-cell">${Math.round(sites.reduce((a, s) => a + (s.costPerPatient || 0), 0) / (sites.length || 1)).toLocaleString()} avg</td>
            <td colSpan="4"></td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

// ─── Mobile Gate: honest fallback instead of pretending the sim works at 375px ───

function MobileGate({ onDismiss }) {

function App() {
  const [activeTab, setActiveTab] = useState('home');
  // Mobile gate: shown until viewport is wide OR user dismisses (persisted).
  const [mobileDismissed, setMobileDismissed] = useState(() => {
    try { return localStorage.getItem(MOBILE_GATE_KEY) === '1'; } catch { return false; }
  });
  const [viewportW, setViewportW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1280);
  useEffect(() => {
    const onResize = () => setViewportW(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const showMobileGate = viewportW < 720 && !mobileDismissed;

  // ── Study View State ──
  const [template, setTemplate] = useState('phase23');
  const [taPreset, setTaPreset] = useState('none');
  const [sources, setSources] = useState([]);
  const [stages, setStages] = useState([]);
  const [targetN, setTargetN] = useState(300);
  const [numSites, setNumSites] = useState(40);
  const [sel, setSel] = useState(null);
  const [prevResult, setPrevResult] = useState(null);
  const [compareOn, setCompareOn] = useState(false);
  const [snapshotName, setSnapshotName] = useState('');
  const [snapshotTab, setSnapshotTab] = useState(null); // which tab the snapshot is from
  const [snapshots, setSnapshots] = useState([]); // array of { id, name, tab, result, stats, ts }
  const [showSnapshotsPanel, setShowSnapshotsPanel] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [customSrcN, setCustomSrcN] = useState(1);
  const [customStgN, setCustomStgN] = useState(1);

  // ── Multi-Site View State ──
  const [sites, setSites] = useState([]);
  const [siteScenario, setSiteScenario] = useState('medium');
  const [siteTargetN, setSiteTargetN] = useState(300);

  // ── Single Site View State ──
  // Single Site state lives in a useReducer so related fields update as one
  // unit (esp. template-load and bidirectional-sync paths). Callers still use
  // the individual ss*/setSs* names via destructure+adapters — no call-site churn.
  const [ssState, ssDispatch] = useReducer((state, action) => {
    switch (action.type) {
      case 'SET': return { ...state, [action.key]: action.value };
      case 'MERGE': return { ...state, ...action.patch };
      default: return state;
    }
  }, {
    ssTemplate: 'academic',
    ssIdentity: SS_TEMPLATES.academic.identity,
    ssStartup: SS_TEMPLATES.academic.startup,
    ssReferrals: SS_TEMPLATES.academic.referrals,
    ssFunnel: SS_TEMPLATES.academic.funnel,
    ssMaxConcurrent: SS_TEMPLATES.academic.maxConcurrent,
    ssTreatmentDuration: 12,
    ssTargetN: SS_TEMPLATES.academic.targetN,
    ssLinkedSiteId: null,
    ssSel: null,
  });
  const { ssTemplate, ssIdentity, ssStartup, ssReferrals, ssFunnel, ssMaxConcurrent, ssTreatmentDuration, ssTargetN, ssLinkedSiteId, ssSel } = ssState;
  // Functional-setter adapter: accepts a value or updater fn, matching useState API.
  const makeSsSetter = (key) => (v) => ssDispatch({ type: 'SET', key, value: typeof v === 'function' ? v(ssState[key]) : v });
  const setSsTemplate = makeSsSetter('ssTemplate');
  const setSsIdentity = makeSsSetter('ssIdentity');
  const setSsStartup = makeSsSetter('ssStartup');
  const setSsReferrals = makeSsSetter('ssReferrals');
  const setSsFunnel = makeSsSetter('ssFunnel');
  const setSsMaxConcurrent = makeSsSetter('ssMaxConcurrent');
  const setSsTreatmentDuration = makeSsSetter('ssTreatmentDuration');
  const setSsTargetN = makeSsSetter('ssTargetN');
  const setSsLinkedSiteId = makeSsSetter('ssLinkedSiteId');
  const setSsSel = makeSsSetter('ssSel');

  // Single dispatch for template load — all related fields update atomically.
  // Previously 8 separate setState calls could produce a brief inconsistent render.
  const loadSsTemplate = useCallback((key) => {
    const t = SS_TEMPLATES[key];
    ssDispatch({ type: 'MERGE', patch: {
      ssIdentity: { ...t.identity },
      ssStartup: JSON.parse(JSON.stringify(t.startup)),
      ssReferrals: t.referrals.map(r => ({ ...r })),
      ssFunnel: t.funnel.map(f => ({ ...f })),
      ssMaxConcurrent: t.maxConcurrent,
      ssTreatmentDuration: 12,
      ssTargetN: t.targetN,
      ssLinkedSiteId: null,
    }});
  }, []);

  // ── Shared ──
  const [toast, setToast] = useState(null);
  const [moreMenuOpen, setMoreMenuOpen] = useState(false);
  // Focus-trap refs for the two overlay panels + the Single Site drawer.
  // (ConfigPanel has its own ref inside the component.)
  // Hooks themselves are declared further down, after their state is defined.
  const snapshotsRef = useRef(null);
  const actualsRef = useRef(null);
  const ssDrawerRef = useRef(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [hasPlayed, setHasPlayed] = useState(false);
  const [animFrame, setAnimFrame] = useState(null);
  const animRef = useRef(null);
  const [playSpeed, setPlaySpeed] = useState(1);
  const [milestone, setMilestone] = useState(null);
  const milestonesHit = useRef(new Set());
  // ── Undo history: snapshots serialized state before destructive actions.
  // Not a full transactional undo — just enough to recover from accidental
  // template switches, TA applies, calibrations, and deletions.
  const historyRef = useRef([]);  // past states (most recent last)
  const futureRef = useRef([]);   // redo stack
  const [historyTick, setHistoryTick] = useState(0); // forces re-render for button disabled state
  const HISTORY_MAX = 20;
  const pushHistory = useCallback((label) => {
    historyRef.current.push({ label, state: JSON.stringify(serializeStateRef.current ? serializeStateRef.current() : null), ts: Date.now() });
    if (historyRef.current.length > HISTORY_MAX) historyRef.current.shift();
    futureRef.current = [];
    setHistoryTick(t => t + 1);
  }, []);
  const serializeStateRef = useRef(null);

  // Welcome banners: dismissal persists per-view in localStorage so returning users aren't re-onboarded.
  const WELCOME_KEY = 'trialsim_welcome_v1';
  const [showWelcome, setShowWelcomeRaw] = useState(() => {
    try {
      const raw = localStorage.getItem(WELCOME_KEY);
      if (raw) { const s = JSON.parse(raw); return { study: s.study !== false, site: s.site !== false, single: s.single !== false }; }
    } catch {}
    return { study: true, site: true, single: true };
  });
  const setShowWelcome = useCallback((updater) => {
    setShowWelcomeRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      try { localStorage.setItem(WELCOME_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  // hasEdited was a pre-v0.4 "Unsaved changes" reminder pointing at JSON Export.
  // Save Scenario (Library) is now the obvious save path, and localStorage
  // autosaves on every change — the reminder was noise. Kept as a stub to
  // avoid churn at the handful of callsites that still reference it.
  const hasEdited = false;
  const setHasEdited = () => {};

  // ── Persistence: localStorage autosave + shareable URL ──
  const STORAGE_KEY = 'trialsim_state_v1';
  const hydrated = useRef(false);
  const hydratedFromSave = useRef(false);

  // ── Study Template Loader ──
  const loadTemplate = useCallback((key) => {
    const t = TEMPLATES[key];
    setSources(t.sources.map(sid => { const b = ALL_SOURCES.find(s => s.id === sid); return b ? { ...b, active: true } : null; }).filter(Boolean));
    setStages(t.stages.map(s => ({ ...s })));
    setTargetN(t.targetN); setNumSites(t.numSites);
    setSel(null); setPrevResult(null); setCompareOn(false); setDrawerOpen(false);
  }, []);
  useEffect(() => { if (!hydratedFromSave.current) loadTemplate(template); }, []);

  // ── Site Scenario Loader ──
  const loadSiteScenario = useCallback((key) => {
    setSites(SITE_SCENARIOS[key].generate());
  }, []);
  useEffect(() => { if (!hydratedFromSave.current) loadSiteScenario(siteScenario); }, []);

  // ── Study Simulation ──
  const result = useMemo(() => simulate(sources, stages, targetN, 104), [sources, stages, targetN]);
  // Uncertainty fan default ON — planners see realistic variance, not false precision.
  // State controls visibility of the fan overlay; MC always runs so toggling is instant.
  const [showMonteCarlo, setShowMonteCarlo] = useState(true);
  const [showActualsPanel, setShowActualsPanel] = useState(false);
  const [actualsInput, setActualsInput] = useState('');
  const [actualsData, setActualsData] = useState(null); // { values: [n per week], fitMultiplier }
  // Now that the relevant open-state flags exist, wire up the focus traps.
  // Library opens focused on the primary action (Save New or first row name
  // input if scenarios exist), otherwise the × close. Actuals opens focused on
  // the textarea so the user can paste immediately. Single-Site drawer focuses
  // the Name field.
  useModalFocusTrap(snapshotsRef, showSnapshotsPanel, 'input[type="text"]');
  useModalFocusTrap(actualsRef, showActualsPanel, 'textarea');
  useModalFocusTrap(ssDrawerRef, !!ssSel, 'input[type="text"]');
  // Gate each Monte Carlo on (a) the active tab and (b) the fan being visible.
  // MC is ~50ms per view × 3 views = ~150ms of CPU on every config change.
  // Previously that ran unconditionally on every edit; now we only pay for
  // the chart the user is actually looking at, when uncertainty is shown.
  const monteCarloResult = useMemo(
    () => (activeTab === 'study' && showMonteCarlo) ? montecarlo(sources, stages, targetN, 200, 0.25, 104) : null,
    [activeTab, showMonteCarlo, sources, stages, targetN]
  );
  const diagnostics = useMemo(() => diagnose({ sources, stages, targetN, result }), [sources, stages, targetN, result]);

  // ── Site Simulation ──
  const siteResult = useMemo(() => simulateSites(sites, siteTargetN, 104), [sites, siteTargetN]);
  const siteMC = useMemo(
    () => (activeTab === 'site' && showMonteCarlo) ? montecarloSites(sites, siteTargetN, 200, 0.25, 104) : null,
    [activeTab, showMonteCarlo, sites, siteTargetN]
  );

  // ── Single-Site Simulation ──
  const ssConfig = useMemo(() => ({ startup: ssStartup, referrals: ssReferrals, funnel: ssFunnel, maxConcurrent: ssMaxConcurrent, coordinatorFTEs: ssIdentity.coordinatorCount, treatmentDuration: ssTreatmentDuration, targetN: ssTargetN }), [ssStartup, ssReferrals, ssFunnel, ssMaxConcurrent, ssIdentity.coordinatorCount, ssTreatmentDuration, ssTargetN]);
  const ssResult = useMemo(() => simulateSingleSite(ssConfig, 104), [ssConfig]);
  const ssMC = useMemo(
    () => (activeTab === 'single' && showMonteCarlo) ? montecarloSingleSite(ssConfig, 200, 0.25, 104) : null,
    [activeTab, showMonteCarlo, ssConfig]
  );
  const ssFPI = useMemo(() => computeFPI(ssStartup), [ssStartup]);

  // Bidirectional sync: push Single Site edits back to the linked Multi-Site row.
  // This silently overwrites the row's rate / activation / screen-fail / dropout
  // / cost — including any manual edits the user made in the table. We:
  //   1. Show a persistent "Syncing to <name>" pill with an Unlink button in the
  //      Single Site toolbar so the sync is visible.
  //   2. Fire a subtle toast the first time the effect runs per link, so the
  //      user knows their edits propagated and can unlink if they didn't want that.
  const syncToastShown = useRef(null); // tracks the ssLinkedSiteId we've already toasted for
  useEffect(() => {
    if (!ssLinkedSiteId) { syncToastShown.current = null; return; }
    const avgDropout = ssFunnel.filter(f => f.conversionRate < 100).reduce((a, f) => a + (f.dropoutRate || 0), 0) / (ssFunnel.filter(f => f.conversionRate < 100).length || 1);
    const totalRefVol = ssReferrals.reduce((a, r) => a + r.volumePerWeek, 0);
    const weightedCost = totalRefVol > 0 ? Math.round(ssReferrals.reduce((a, r) => a + r.volumePerWeek * (r.costPerPatient || 0), 0) / totalRefVol) : 0;
    let syncedName = null;
    setSites(prev => prev.map(s => {
      if (s.id !== ssLinkedSiteId) return s;
