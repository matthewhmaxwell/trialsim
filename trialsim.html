                    <button className="btn btn-ghost" onClick={() => {
                      const b = new Blob([JSON.stringify({ v: 1, exportedAt: new Date().toISOString(), scenarios: snapshots }, null, 2)], { type: 'application/json' });
                      const u = URL.createObjectURL(b); const a = document.createElement('a');
                      a.href = u; a.download = `trialsim_scenarios_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(u);
                      showToast('Scenarios exported');
                    }}>Export Library</button>
                    <button className="btn btn-ghost" onClick={() => { if (confirm('Clear all saved scenarios? This cannot be undone.')) { setSnapshots([]); setCompareOn(false); } }}>Clear All</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
      {showActualsPanel && (
        <div className="snapshots-overlay" onClick={e => { if (e.target === e.currentTarget) setShowActualsPanel(false); }} role="dialog" aria-modal="true" aria-label="Calibrate from actuals">
          <div className="snapshots-panel" style={{ maxWidth: 620 }} ref={actualsRef}>
            <div className="snapshots-header">
              <h3>Calibrate from Actuals</h3>
              <button className="config-close" onClick={() => setShowActualsPanel(false)} aria-label="Close calibration panel">&times;</button>
            </div>
            <div className="snapshots-body" style={{ padding: 20 }}>
              <div style={{ display: 'flex', gap: 4, marginBottom: 14, borderBottom: '1px solid var(--border)' }}>
                {[
                  { k: 'aggregate', label: 'Aggregate' },
                  { k: 'sites', label: 'Per-Site' },
                  { k: 'sources', label: 'Per-Source' },
                ].map(t => (
                  <button key={t.k} onClick={() => setActualsMode(t.k)} style={{
                    padding: '6px 12px', fontSize: 11, fontWeight: 600, cursor: 'pointer',
                    background: 'none', border: 'none', borderBottom: actualsMode === t.k ? '2px solid var(--accent)' : '2px solid transparent',
                    color: actualsMode === t.k ? 'var(--accent)' : 'var(--text3)', fontFamily: 'inherit',
                  }}>{t.label}</button>
                ))}
              </div>
              {actualsMode === 'aggregate' && <>
                <p style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 10 }}>Paste week-by-week enrollment (one number per week). Either cumulative totals or weekly new enrollments — we'll detect which.</p>
                <textarea value={actualsInput} onChange={e => setActualsInput(e.target.value)} rows={8} style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 10, fontSize: 12, fontFamily: 'monospace', resize: 'vertical', color: 'var(--text)', background: 'var(--bg2)' }} placeholder={'e.g.\n3, 8, 14, 19, 27\nor one per line\n3\n8\n14'} />
              </>}
              {actualsMode === 'sites' && <>
                <p style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 6 }}>Paste a row per site with observed enrollment. Site names match by substring (case-insensitive). Each matched site's rate will be rescaled.</p>
                <p style={{ fontSize: 10, color: 'var(--text3)', marginBottom: 10, fontFamily: 'monospace' }}>Format: <strong>site_name, weeks_active, enrolled</strong></p>
                <textarea value={actualsInput} onChange={e => setActualsInput(e.target.value)} rows={9} style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 10, fontSize: 12, fontFamily: 'monospace', resize: 'vertical', color: 'var(--text)', background: 'var(--bg2)' }} placeholder={'Memorial Sloan Kettering, 14, 22\nMD Anderson, 12, 15\nMayo, 10, 9\n# lines with # ignored; first row can be a header'} />
              </>}
              {actualsMode === 'sources' && <>
                <p style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 6 }}>Paste a row per source with observed identified patients. Source names match by substring (case-insensitive). Each matched source's volume will be rescaled.</p>
                <p style={{ fontSize: 10, color: 'var(--text3)', marginBottom: 10, fontFamily: 'monospace' }}>Format: <strong>source_name, weeks_active, identified</strong></p>
                <textarea value={actualsInput} onChange={e => setActualsInput(e.target.value)} rows={9} style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 10, fontSize: 12, fontFamily: 'monospace', resize: 'vertical', color: 'var(--text)', background: 'var(--bg2)' }} placeholder={'Digital Advertising, 8, 120\nPhysician Referral, 8, 40\nSite Database, 10, 95'} />
              </>}
              <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between', alignItems: 'center', marginTop: 12 }}>
                <div style={{ fontSize: 10, color: 'var(--text3)' }}>
                  {actualsMode === 'aggregate' && 'Applies to Study View curve'}
                  {actualsMode === 'sites' && `${sites.length} sites available for matching`}
                  {actualsMode === 'sources' && `${sources.length} sources available for matching`}
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button className="btn btn-ghost" onClick={() => setShowActualsPanel(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={applyActuals}>Apply & Refit</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
      {milestone && <MilestoneBadge key={milestone.key} milestone={milestone} />}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { style: { padding: 60, textAlign: 'center', fontFamily: 'Inter, sans-serif', color: '#1e1e1e' } },
        React.createElement('h2', { style: { fontSize: 20, marginBottom: 12 } }, 'Something went wrong'),
        React.createElement('p', { style: { fontSize: 13, color: '#5c5650', marginBottom: 20, lineHeight: 1.6 } }, 'Trialsim encountered an unexpected error. This is usually caused by a malformed import file or an edge case in the simulation.'),
        React.createElement('button', {
          onClick: () => { this.setState({ hasError: false, error: null }); },
          style: { padding: '8px 20px', borderRadius: 6, border: '1px solid #d4cfca', background: '#fff', cursor: 'pointer', fontSize: 13, fontFamily: 'inherit', marginRight: 8 }
        }, 'Try Again'),
        React.createElement('button', {
          onClick: () => { window.location.reload(); },
          style: { padding: '8px 20px', borderRadius: 6, border: 'none', background: '#b04e30', color: '#fff', cursor: 'pointer', fontSize: 13, fontFamily: 'inherit' }
        }, 'Reload Page'),
        React.createElement('p', { style: { fontSize: 10, color: '#8c857e', marginTop: 16 } }, String(this.state.error))
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
